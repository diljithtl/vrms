<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driver Dashboard | Vehicle Rental System</title>

<style>
/* ---------- GLOBAL ---------- */
* {
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    margin: 0;
    background: #f4f6f9;
    color: #333;
}

/* ---------- NAVBAR ---------- */
.navbar {
    background: #2f3e52;
    color: white;
    padding: 14px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* ---------- PAGE ---------- */
.container {
    padding: 25px;
}

/* ---------- STATS ---------- */
.stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-bottom: 25px;
}

.stat-card {
    padding: 18px;
    border-radius: 8px;
    color: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.stat-card h3 {
    margin: 0;
    font-size: 14px;
    font-weight: 500;
}

.stat-card p {
    margin: 8px 0 0;
    font-size: 26px;
    font-weight: bold;
}

.blue { background: #3b82f6; }
.green { background: #22c55e; }
.dark { background: #475569; }

/* ---------- CARD ---------- */
.card {
    background: white;
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

/* ---------- TABLE ---------- */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #e5e7eb;
    text-align: left;
    font-size: 14px;
}

th {
    background: #f1f5f9;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>Driver Dashboard</div>
    <div>Driver</div>
</div>

<!-- CONTENT -->
<div class="container">

    <!-- STATS -->
    <div class="stats">
        <div class="stat-card blue">
            <h3>Assigned Trips</h3>
            <p>3</p>
        </div>

        <div class="stat-card green">
            <h3>Completed Trips</h3>
            <p>12</p>
        </div>

        <div class="stat-card dark">
            <h3>Status</h3>
            <p>Active</p>
        </div>
    </div>

    <!-- TRIPS -->
    <div class="card">
        <h3>Upcoming Trips</h3>
        <table>
            <tr>
                <th>Customer</th>
                <th>Vehicle</th>
                <th>Date</th>
                <th>Pickup</th>
            </tr>

            <tr>
                <td>Anil Kumar</td>
                <td>Swift Dzire</td>
                <td>10 Feb 2026</td>
                <td>Calicut</td>
            </tr>

            <tr>
                <td>Rahul P</td>
                <td>Hyundai Creta</td>
                <td>12 Feb 2026</td>
                <td>Wayanad</td>
            </tr>
        </table>
    </div>

</div>

</body>
</html>
