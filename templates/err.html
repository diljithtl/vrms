<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 | Page Not Found</title>

<style>
* {
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    background: #f4f6f9;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #333;
}

/* ---------- CARD ---------- */
.card {
    background: white;
    border-radius: 8px;
    padding: 40px;
    width: 420px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.card h1 {
    font-size: 80px;
    margin: 0;
    color: #ef4444;
}

.card h3 {
    margin: 10px 0;
}

.card p {
    font-size: 14px;
    color: #64748b;
}

/* ---------- BUTTON ---------- */
.btn {
    margin-top: 20px;
    padding: 10px 20px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
    <h1>404</h1>
    <h3>Page Not Found</h3>
    <p>The page you are looking for doesn’t exist or has been moved.</p>
    <button class="btn" onclick="location.href='login.html'">Go to Login</button>
</div>

</body>
</html>
