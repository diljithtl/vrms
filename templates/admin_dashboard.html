<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Dashboard | Vehicle Rental System</title>

<style>
/* ---------- GLOBAL ---------- */
* {
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    margin: 0;
    background: #f4f6f9;
    color: #333;
}

/* ---------- NAVBAR ---------- */
.navbar {
    background: #2f3e52;
    color: white;
    padding: 14px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar span {
    font-weight: 600;
}

.navbar button {
    background: #22c55e;
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 4px;
    cursor: pointer;
}

/* ---------- CONTAINER ---------- */
.container {
    padding: 25px;
}

/* ---------- STATS ---------- */
.stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
    padding: 18px;
    border-radius: 8px;
    color: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.stat-card h3 {
    margin: 0;
    font-size: 14px;
    opacity: 0.9;
}

.stat-card p {
    margin: 8px 0 0;
    font-size: 26px;
    font-weight: bold;
}

.blue { background: #3b82f6; }
.red { background: #ef4444; }
.green { background: #22c55e; }
.dark { background: #475569; }

/* ---------- PANELS ---------- */
.panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.panel {
    background: white;
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.panel h3 {
    margin-bottom: 15px;
}

/* ---------- CHART PLACEHOLDER ---------- */
.chart {
    height: 220px;
    border-radius: 6px;
    background: repeating-linear-gradient(
        45deg,
        #e5e7eb,
        #e5e7eb 10px,
        #f8fafc 10px,
        #f8fafc 20px
    );
    display: flex;
    align-items: center;
    justify-content: center;
    color: #64748b;
    font-weight: 600;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <span>Vehicle Rental Management System</span>
    <button>Logout</button>
</div>

<div class="container">

    <!-- STATS -->
    <div class="stats">
        <div class="stat-card blue">
            <h3>Total Vehicles</h3>
            <p>120</p>
        </div>

        <div class="stat-card red">
            <h3>Bookings Today</h3>
            <p>25</p>
        </div>

        <div class="stat-card green">
            <h3>Revenue Today</h3>
            <p>$5,500</p>
        </div>

        <div class="stat-card dark">
            <h3>Active Drivers</h3>
            <p>18</p>
        </div>
    </div>

    <!-- CHARTS -->
    <div class="panels">
        <div class="panel">
            <h3>Booking Overview</h3>
            <div class="chart">Chart Area</div>
        </div>

        <div class="panel">
            <h3>Revenue Chart</h3>
            <div class="chart">Chart Area</div>
        </div>
    </div>

</div>

</body>
</html>
