<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vehicle Management | Vehicle Rental System</title>

<style>
/* ---------- GLOBAL ---------- */
* {
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    margin: 0;
    background: #f4f6f9;
    color: #333;
}

/* ---------- NAVBAR ---------- */
.navbar {
    background: #2f3e52;
    color: white;
    padding: 14px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar .title {
    font-size: 18px;
    font-weight: 600;
}

/* ---------- PAGE ---------- */
.container {
    padding: 25px;
}

/* ---------- CARD ---------- */
.card {
    background: white;
    border-radius: 8px;
    padding: 20px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

/* ---------- HEADER ---------- */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
}

/* ---------- BUTTONS ---------- */
.btn {
    padding: 8px 14px;
    border: none;
    border-radius: 4px;
    color: white;
    cursor: pointer;
    font-size: 14px;
}

.btn-blue { background: #3b82f6; }
.btn-red { background: #ef4444; }
.btn-green { background: #22c55e; }

/* ---------- TABLE ---------- */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #e5e7eb;
    text-align: left;
    font-size: 14px;
}

th {
    background: #f1f5f9;
}

/* ---------- STATUS ---------- */
.status {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    color: white;
}

.available { background: #22c55e; }
.booked { background: #f59e0b; }
.unavailable { background: #ef4444; }
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="title">Vehicle Management</div>
</div>

<!-- CONTENT -->
<div class="container">
    <div class="card">

        <div class="header">
            <h3>Vehicle List</h3>
            <button class="btn btn-green">+ Add Vehicle</button>
        </div>

        <table>
            <tr>
                <th>Vehicle</th>
                <th>Type</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>

            <tr>
                <td>Swift Dzire</td>
                <td>Car</td>
                <td><span class="status available">Available</span></td>
                <td>
                    <button class="btn btn-blue">Edit</button>
                    <button class="btn btn-red">Delete</button>
                </td>
            </tr>

            <tr>
                <td>Creta</td>
                <td>SUV</td>
                <td><span class="status booked">Booked</span></td>
                <td>
                    <button class="btn btn-blue">Edit</button>
                    <button class="btn btn-red">Delete</button>
                </td>
            </tr>

            <tr>
                <td>Royal Enfield</td>
                <td>Bike</td>
                <td><span class="status unavailable">Unavailable</span></td>
                <td>
                    <button class="btn btn-blue">Edit</button>
                    <button class="btn btn-red">Delete</button>
                </td>
            </tr>

        </table>

    </div>
</div>

</body>
</html>
